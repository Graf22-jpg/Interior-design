<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | INTERIOR</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">INTERIOR</a>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html">Головна</a></li>
                    <li><a href="portfolio.html">Портфоліо</a></li>
                    <li><a href="index.html#services">Послуги</a></li>
                    <li><a href="contacts.html" class="active">Контакти</a></li>
                </ul>
            </nav>
            <button class="burger-btn" id="burger-btn">
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="contacts">
            <div class="container">
                <h1 class="section-title reveal" style="margin-top: 50px;">Зв'яжіться з нами</h1>
                
                <div class="contacts__wrapper reveal">
                    <form id="contact-form" class="contact-form" novalidate>
                        
                        <div class="form-group">
                            <label for="name">Ваше ім'я</label>
                            <input type="text" id="name" placeholder="Введіть ваше ім'я" required>
                            <span class="error-msg">Ім'я має містити мінімум 2 символи</span>
                        </div>

                        <div class="form-group">
                            <label for="email">Ваш Email</label>
                            <input type="email" id="email" placeholder="example@mail.com" required>
                            <span class="error-msg">Будь ласка, введіть коректну адресу пошти</span>
                        </div>

                        <div class="form-group">
                            <label for="message">Повідомлення</label>
                            <textarea id="message" placeholder="Опишіть ваш проект або запитання..." rows="5"></textarea>
                            <span class="error-msg">Будь ласка, напишіть хоча б декілька слів (мін. 5 символів)</span>
                        </div>

                        <button type="submit" class="btn">Відправити запит</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Студія дизайну інтер'єру. Всі права захищені.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
